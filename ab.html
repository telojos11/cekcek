<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drive Upload PoC</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: #fafafa;
    }

    h1 {
      margin-top: 100px;
      color: #333;
    }

    a {
      display: inline-block;
      margin: 20px;
      font-size: 18px;
      color: blue;
      cursor: pointer;
    }

    input {
      display: none;
    }

    img {
      max-width: 80%;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>Right Click → Open in Split / New Tab</h1>

<a id="link" href="https://workspace.google.com/products/drive/">
  Open Google Drive & Upload Fast
</a>

<input id="fileInput" type="file" accept="image/*">
<img id="preview">

<script>
const link = document.getElementById('link');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');

// Gunakan pointerdown (lebih reliable dari click/contextmenu)
link.addEventListener('pointerdown', () => {

  // Simpan user activation
  let activated = true;

  setTimeout(() => {
    if (!activated) return;

    try {
      fileInput.click();
    } catch (e) {
      console.log("Blocked:", e);
    }
  }, 2500); // jangan terlalu lama (biar masih valid gesture)

}, { once: true });

// Preview file
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    console.log("Selected:", file.name);
  }
});
</script>

</body>
</html>
