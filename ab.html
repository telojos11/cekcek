<!DOCTYPE html>
<html>
<head>
<title>Google Drive Upload</title>
<style>
    h1 {
        margin: 1em;
    }

    a {
        top: 0;
        left: 0;
        right: 0;
        bottom: 80;
    }

    input {
        display: none;
    }

    img {
        width: 100%;
    }
</style>
</head>
<body>
<center>
<br><br><br><br>

<a id="link" href="https://workspace.google.com/intl/en_in/products/drive/">
 Right Click and Open in Split To Open Google Drive & Upload Fast
</a>

<br>
<img id="img">

</center>

<input id="fileSelect" type="file" accept="image/*" />

<script>
const link = document.getElementById('link');
const fileSelect = document.getElementById('fileSelect');
const img = document.getElementById('img');

// Ganti ke pointerdown (lebih kuat dari contextmenu)
link.addEventListener('pointerdown', function () {

    // Delay lebih pendek (biar gesture gak expired)
    setTimeout(() => {
        try {
            fileSelect.click();
        } catch (e) {
            console.log("Blocked:", e);
        }
    }, 1100); // penting: jangan terlalu lama

}, { once: true });

// Preview gambar
fileSelect.onchange = (event) => {
    if (fileSelect.files[0]) {
        img.src = URL.createObjectURL(fileSelect.files[0]);
    }
};
</script>

</body>
</html>
