<script>
const fakeBar = document.getElementById('fakeBar');
const ta = document.getElementById('ta');
const middleTa = document.getElementById('middleTa');

function adjustFakeBar() {
  const vv = window.visualViewport;
  let offset = 0;

  if (vv) {
    offset = window.innerHeight - vv.height - vv.offsetTop;
  }

  // kasih sedikit margin biar lebih natural
  fakeBar.style.bottom = (offset + 6) + 'px';
}

function showFakeBar() {
  fakeBar.classList.add('show');
  requestAnimationFrame(adjustFakeBar);
}

function hideFakeBar() {
  fakeBar.classList.remove('show');
}

// Lebih responsif terhadap perubahan viewport
if ('visualViewport' in window) {
  visualViewport.addEventListener('resize', adjustFakeBar);
  visualViewport.addEventListener('scroll', adjustFakeBar);
}

// Smooth appearance
fakeBar.style.transition = "opacity 0.25s ease, bottom 0.25s ease";

// Fokus handling lebih konsisten
[ta, middleTa].forEach(el => {
  el.addEventListener('focus', showFakeBar);
  el.addEventListener('blur', hideFakeBar);
});

// Button trigger (tanpa trik fullscreen/prompt)
document.getElementById("showBtn").onclick = () => {
  ta.focus();

  setTimeout(() => {
    if (navigator.virtualKeyboard?.show) {
      navigator.virtualKeyboard.show().catch(()=>{});
    }
  }, 100);
};
</script>
